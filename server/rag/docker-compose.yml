# Qdrant vector database for CaiShen tax-law RAG
#
# Start:   docker compose -f server/rag/docker-compose.yml up -d
# Stop:    docker compose -f server/rag/docker-compose.yml down
# Data persists in the named volume `caishen_qdrant_storage`.
#
# Ollama is NOT containerized here — install it natively (Windows/macOS/Linux)
# for GPU access, then: `ollama pull nomic-embed-text`
# Ollama serves on http://localhost:11434 by default.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: caishen-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API (optional)
    volumes:
      - caishen_qdrant_storage:/qdrant/storage
    # Uncomment to require an API key (then set QDRANT_API_KEY in .env):
    # environment:
    #   QDRANT__SERVICE__API_KEY: "your-strong-key"

volumes:
  caishen_qdrant_storage:
